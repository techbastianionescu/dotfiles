"$schema" = 'https://starship.rs/config-schema.json'

# ── Layout ────────────────────────────────────────────────────────────────────
# Two-line prompt: info on top, prompt char alone on the next line.
# Each module embeds its own leading separator " · " so it disappears together
# with the module when the module itself is empty (no orphan separators).

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$rust\
$golang\
$java\
$package\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = "rose-pine"

# ── Palette ───────────────────────────────────────────────────────────────────
# Rosé Pine, matching the Claude Code statusline at ~/.claude/statusline-command.sh

[palettes.rose-pine]
foam   = "#9ccfd8"  # teal-cyan   — directory anchor
rose   = "#ebbcba"  # muted rose  — git branch
gold   = "#f6c177"  # amber       — git status, time
iris   = "#c4a7e7"  # soft violet — language versions
muted  = "#6e6a86"  # ghost dim   — separators, secondary
love   = "#eb6f92"  # rose-red    — errors

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style = "bold foam"

# ── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
symbol = "⎇"
format = '[ · ](muted)[$symbol  $branch]($style)'
style = "rose"

[git_status]
style = "gold"

# ── Language versions ────────────────────────────────────────────────────────
[nodejs]
format = '[ · ](muted)[$symbol $version]($style)'
style = "iris"

[python]
format = '[ · ](muted)[$symbol $version]($style)'
style = "iris"

[rust]
format = '[ · ](muted)[$symbol $version]($style)'
style = "iris"

[golang]
format = '[ · ](muted)[$symbol $version]($style)'
style = "iris"

[java]
format = '[ · ](muted)[$symbol $version]($style)'
style = "iris"

[package]
format = '[ · ](muted)[$symbol $version]($style)'
style = "iris"

# ── Command duration ─────────────────────────────────────────────────────────
[cmd_duration]
format = '[ · ](muted)[took $duration]($style)'
style = "muted"
min_time = 2_000

# ── Prompt character ─────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](foam)"
error_symbol = "[❯](love)"
